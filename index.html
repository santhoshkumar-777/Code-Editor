    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'rgb(var(--color-primary) / <alpha-value>)',
              'primary-hover': 'rgb(var(--color-primary-hover) / <alpha-value>)',
              background: 'rgb(var(--color-background) / <alpha-value>)',
              surface: 'rgb(var(--color-surface) / <alpha-value>)',
              border: 'rgb(var(--color-border) / <alpha-value>)',
              text: 'rgb(var(--color-text) / <alpha-value>)',
              'text-secondary': 'rgb(var(--color-text-secondary) / <alpha-value>)',

            }
          }
        }
      }
    </script>
    <!-- Monaco Editor Loader -->
    <script>
        window.MonacoEnvironment = {
            getWorkerUrl: function (moduleId, label) {
                const workers = {
                    json: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/language/json/json.worker.js',
                    css: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/language/css/css.worker.js',
                    html: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/language/html/html.worker.js',
                    ts: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/language/typescript/ts.worker.js',
                    editor: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.worker.js'
                };
                if (label === 'json') return workers.json;
                if (['css', 'scss', 'less'].includes(label)) return workers.css;
                if (['html', 'handlebars', 'razor'].includes(label)) return workers.html;
                if (['typescript', 'javascript'].includes(label)) return workers.ts;
                return workers.editor;
            }
        };
    </script>
